<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nutriwise Ultra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <header>
        <div class="logo reveal">Nutriwise</div>
        <div class="controls reveal delay-1">
            <div id="google_translate_element"></div>
            <button class="btn-icon" onclick="toggleTheme()">🌓</button>
        </div>
    </header>

    <div id="mainMenu" class="page active">
        <h1 class="hero-title reveal delay-1">Nutriwise</h1>
        <p class="hero-subtitle reveal delay-2">know exactly what you are eating.</p>
        
        <div class="action-cards reveal delay-3">
            <div class="card" onclick="openCamera()">
                <h2>Live Scan</h2>
                <p>Point your camera at a label.</p>
            </div>
            <div class="card" onclick="document.getElementById('imageInput').click()">
                <h2>Upload Photo</h2>
                <p>Choose an image from your gallery.</p>
            </div>
        </div>
        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="uploadFromGallery(event)">
    </div>

    <div id="cameraUI" class="page">
        <div class="camera-wrapper reveal">
            <video id="videoElement" autoplay playsinline></video>
            <div class="cam-controls">
                <button class="cam-btn btn-cancel" onclick="closeCamera()">Cancel</button>
                <button class="cam-btn btn-capture" onclick="captureAndAnalyze()">Analyze Label</button>
            </div>
        </div>
    </div>

    <div id="loadingUI" class="page">
        <div class="loader-container reveal">
            <h2>Scanning...</h2>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="loadingFill"></div></div>
            <p id="loadingText">Extracting data...</p>
        </div>
    </div>

    <div id="resultsBox" class="page">
        <div class="results-content-wrapper">
            
            <div class="top-split-layout">
                
                <div class="preview-col reveal delay-1">
                    <div class="id-header">
                        <p>Identified Label</p>
                        <h2 id="productNameDisplay">Scanning...</h2>
                    </div>
                    <div class="scanned-preview-container" onclick="openModal()">
                        <img id="previewImg" src="" alt="Scanned Food">
                        <div class="expand-hint">Expand</div>
                    </div>
                </div>

                <div class="stats-col reveal delay-2">
                    <div class="rating-section" id="ratingContainer">
                        </div>
                    
                    <div class="bento-grid">
                        <div class="macro-card"><span id="val-protein">0g</span><small>Protein</small></div>
                        <div class="macro-card"><span id="val-carbs">0g</span><small>Carbs</small></div>
                        <div class="macro-card"><span id="val-fats">0g</span><small>Fats</small></div>
                        <div class="macro-card"><span id="val-sugar">0g</span><small>Sugar</small></div>
                    </div>
                </div>

            </div>

            <div class="reveal delay-3">
                <h2 class="emphasis-header">Deep Analysis & Better Choices</h2>
                <div class="analysis-section" id="flagsContainer">
                    </div>
            </div>

            <button class="btn-restart reveal delay-4" onclick="resetApp()">Scan Another Item</button>
        </div>
    </div>

    <div id="imageModal" onclick="closeModal()">
        <img id="modalImg" src="">
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en', includedLanguages: 'hi,mr,ta,bn,en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script src="script.js"></script>
</body>
</html>
